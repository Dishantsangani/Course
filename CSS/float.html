<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float</title>
  </head>
  <body>
    <form action="" method="post" class="smart-green">
      <h1>
        Contact Form
        <span>Please fill all the in fileds.</span>
      </h1>

      <label>
        <span>Youe Name:</span>
        <input id="name" type="text" name="name" placeholder="Your Full Name" />
      </label>

      <label>
        <span>Your Email</span>
        <input
          id="email"
          type="email"
          name="email"
          placeholder="Valid Email Address"
        />
      </label>

      <label>
        <span>Message:</span>
        <textarea
          name="Message"
          id="Message"
          placeholder="Your Message to us"
        ></textarea>
      </label>
      <label>
        <span>Subject:</span
        ><select name="selection">
          <option value="Job inquriy">Job inquriy</option>
          <option value="General Question">General Question</option>
        </select>
      </label>
      <label>
        <span></span>
        <input type="button" class="button" value="send" />
      </label>
    </form>
  </body>
</html>
