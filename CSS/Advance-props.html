<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        text-align: center;
        background: rgb(121, 121, 121);
      }
      .clip-circle {
        clip-path: polygon(
          0% 15%,
          15% 15%,
          15% 0%,
          85% 0%,
          85% 15%,
          100% 15%,
          100% 85%,
          85% 85%,
          85% 100%,
          15% 100%,
          15% 85%,
          0% 85%
        );
      }
      body,
      html {
        height: 100%;
      }
      img {
        height: 75%;
      }
    </style>
  </head>
  <body>
    <img class="clip-circle" src="../image/IMG_E4193.JPG" alt="" srcset="" />
  </body>
</html>
